name: AW1 Public Truth Watchdog

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  public-truth:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Probe AW1 and chat public logs
        shell: bash
        run: |
          python3 scripts/check_public_truth.py

      - name: Commit stable result JSON for raw URL and GitHub Pages
        if: always()
        shell: bash
        run: |
          git config user.name "aw1-public-truth-watchdog"
          git config user.email "actions@users.noreply.github.com"
          git add results/aw1_github_public_truth_result.json docs/aw1_github_public_truth_result.json
          git commit -m "Update AW1 public truth result" || true
          git push || true

      - name: Upload watchdog result
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aw1-github-public-truth-result
          path: |
            results/aw1_github_public_truth_result.json
            docs/aw1_github_public_truth_result.json
